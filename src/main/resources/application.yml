spring:
  application:
    name: sse-notification

  # H2 Database
  datasource:
    url: jdbc:h2:mem:notificationdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  # H2 Console
  h2:
    console:
      enabled: true
      path: /h2-console

# Server
server:
  port: 8080

# Logging
logging:
  level:
    com.codeit.notification: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Custom Properties
notification:
  # SSE ?? ???? (???)
  timeout: 3600000  # 1??
  # ???? ?? (???)
  heartbeat-interval: 30000  # 30?